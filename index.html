<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bild-Test</title>
    <style>
        /* ---------- RESET ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* verhindert Scrollen */
            background: #f2f7fc; /* Fallback-Farbe, falls Bild nicht lädt */
        }

        /* ---------- BILD-CONTAINER ---------- */
        .fullscreen-image {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fullscreen-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;   /* Bild füllt den Container immer randfüllend */
            display: block;
        }
    </style>
</head>
<body>
    <div class="fullscreen-image">
        <img src="CCEC7E54-6097-4D76-9703-426F9B25DD2A.png" alt="Testbild" />
    </div>
</body>
</html>
