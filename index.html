<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Startseite – perfekt für jedes Smartphone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f2f7fc;
        }

        .fullscreen-image {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fullscreen-image picture,
        .fullscreen-image img {
            width: 100%;
            height: 100%;
            display: block;
        }

        .fullscreen-image img {
            object-fit: cover;
            object-position: center;
        }
    </style>
</head>
<body>
    <div class="fullscreen-image">
        <picture>
            <!-- Für sehr schmale Smartphones (hochkant, z. B. 19:5:9) -->
            <source 
                media="(max-width: 480px) and (orientation: portrait)" 
                srcset="bild-portrait.jpg" 
            />
            <!-- Für breitere Smartphones (quer, z. B. 16:9) -->
            <source 
                media="(max-width: 900px) and (orientation: landscape)" 
                srcset="bild-landscape.jpg" 
            />
            <!-- Für Tablets und Desktops (Standard) -->
            <source 
                media="(min-width: 901px)" 
                srcset="bild-desktop.jpg" 
            />
            <!-- Fallback für alle anderen Geräte -->
            <img src="bild-default.jpg" alt="Bioingenieurwesen" />
        </picture>
    </div>
</body>
</html>
