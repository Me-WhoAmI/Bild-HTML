<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bioingenieurwesen</title>
    <style>
        /* ---------- RESET ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ---------- STARTSEITE (exakt wie gehabt) ---------- */
        #start {
            min-height: 100vh;
            background-image: url('CCEC7E54-6097-4D76-9703-426F9B25DD2A.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* ---------- SEITE "ÜBER MICH" (einfach darunter) ---------- */
        #ueber-mich {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        #ueber-mich h2 {
            font-size: 3rem;
            font-weight: 300;
            color: #13323f;
            margin-bottom: 1rem;
        }

        #ueber-mich p {
            font-size: 1.2rem;
            color: #4a6a80;
            max-width: 600px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- ========== STARTSEITE (unverändert) ========== -->
    <section id="start"></section>

    <!-- ========== SEITE "ÜBER MICH" ========== -->
    <section id="ueber-mich">
        <h2>Über mich</h2>
        <p>Hier kommt später Ihr Text.</p>
    </section>

</body>
</html>
