<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bioingenieurwesen – Startseite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        /* ---------- STARTSEITE ---------- */
        #start {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('CCEC7E54-6097-4D76-9703-426F9B25DD2A.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* ---------- OVERLAY FÜR "ÜBER MICH" ---------- */
        .menu-overlay {
            position: absolute;
            top: 6%;
            left: 31%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        .menu-overlay a {
            text-decoration: none;
            color: #13323f;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.3rem 0;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s, color 0.2s;
        }

        .menu-overlay a:hover {
            border-bottom-color: #2a7a9c;
            color: #1f6a8a;
        }

        /* ---------- SEITE "ÜBER MICH" (NEU) ---------- */
        #ueber-mich {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            /* Neuer Hintergrund mit Farbverlauf */
            background: linear-gradient(120deg, #f9f5f0 0%, #f2eae3 100%);
            position: relative;
            overflow: hidden;
        }

        /* Große, unscharfe Kreise als Dekoration */
        #ueber-mich::before {
            content: "";
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(220, 200, 180, 0.08) 0%, rgba(220, 200, 180, 0) 70%);
            top: -250px;
            right: -200px;
            border-radius: 50%;
            filter: blur(70px);
            z-index: 0;
        }

        #ueber-mich::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(190, 200, 220, 0.05) 0%, rgba(190, 200, 220, 0) 70%);
            bottom: -200px;
            left: -150px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }

        /* Inhalt der Sektion wird über den Kreisen angezeigt */
        #ueber-mich .content {
            position: relative;
            z-index: 1;
            max-width: 800px;
        }

        #ueber-mich h2 {
            font-size: 3rem;
            font-weight: 300;
            color: #13323f;
            margin-bottom: 1rem;
        }

        #ueber-mich p {
            font-size: 1.2rem;
            color: #4a6a80;
            max-width: 600px;
            line-height: 1.6;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <section id="start">
        <div class="menu-overlay">
            <a href="#ueber-mich">Über mich</a>
        </div>
    </section>

    <section id="ueber-mich">
        <div class="content">
            <h2>Über mich</h2>
            <p>Hier kommt später Ihr Text.</p>
        </div>
    </section>

</body>
</html>
