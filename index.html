<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bioingenieurwesen – Desktop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }


        #start {
    position: relative;
    width: 100vw;         /* ← Container verkleinern */
    height: 100vh;
    margin: 0 auto;        /* ← zentrieren */
    overflow: hidden;
}

        #start img {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;   /* ← Bild bleibt komplett sichtbar */
    display: block;
}



    </style>
</head>
<body>
    <section id="start">
        <img src="CCEC7E54-6097-4D76-9703-426F9B25DD2A.png" alt="Bioingenieurwesen" />
    </section>
</body>
</html>
