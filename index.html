<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bioingenieurwesen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-image: url('CCEC7E54-6097-4D76-9703-426F9B25DD2A.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: scroll; /* fixed entfernt für bessere mobile Performance */
        }

        /* Für sehr schmale Smartphones (z. B. 390px Breite) */
        @media (max-width: 480px) {
            body {
                background-position: top center; /* wichtigste Inhalte oben – passe es an */
                /* Alternativen: center center, bottom center */
            }
        }
    </style>
</head>
<body></body>
</html>
