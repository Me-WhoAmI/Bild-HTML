<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bioingenieurwesen – Startseite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        /* ---------- STARTSEITE (Bild als Vollbild) ---------- */
        #start {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #start img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover; /* optional, aber sicherheitshalber */
            display: block;
        }

        /* ---------- OVERLAYS (bleiben über dem Bild) ---------- */
        .menu-overlay {
            position: absolute;
            top: 6%;
            left: 31%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            z-index: 10;
        }

        .menu-overlay a {
            text-decoration: none;
            color: #13323f;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.3rem 0;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s, color 0.2s;
        }

        .menu-overlay a:hover {
            border-bottom-color: #2a7a9c;
            color: #1f6a8a;
        }

        .name-overlay {
            position: absolute;
            top: 2%;
            left: 4%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #13323f;
            white-space: nowrap;
            z-index: 10;
            letter-spacing: 0.3px;
        }

        /* ---------- SEITE "ÜBER MICH" (unverändert) ---------- */
        #ueber-mich {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 2rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(120deg, #f9f5f0 0%, #f2eae3 100%);
            position: relative;
            overflow: hidden;
        }

        #ueber-mich::before {
            content: "";
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(220, 200, 180, 0.08) 0%, rgba(220, 200, 180, 0) 70%);
            top: -250px;
            right: -200px;
            border-radius: 50%;
            filter: blur(70px);
            z-index: 0;
        }

        #ueber-mich::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(190, 200, 220, 0.05) 0%, rgba(190, 200, 220, 0) 70%);
            bottom: -200px;
            left: -150px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }

        #ueber-mich .content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            padding-top: 5vh;
        }

        #ueber-mich h2 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff 0%, #40e0d0 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #ueber-mich p {
            font-size: 1.2rem;
            color: #4a6a80;
            max-width: 600px;
            line-height: 1.6;
            margin: 0 auto;
        }

        /* ========== SMARTPHONE-OPTIMIERUNGEN ========== */

        @media (max-width: 768px) {
    #start {
        display: flex;
        justify-content: center;
        align-items: flex-start;    /* ← Bild oben ausrichten */
        width: 100vw;
        height: auto;
        overflow: hidden;
    }

    #start img {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
        object-position: top center;  /* ← zusätzlich oben im Container */
        display: block;
    }

    /* Overlays ... (wie gehabt) */
    .menu-overlay {
        top: 4%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 0.4rem 1.2rem;
    }

    .menu-overlay a {
        font-size: 0.85rem;
    }

    .name-overlay {
        top: 85%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 1rem;
        padding: 0.3rem 1rem;
    }

    #ueber-mich h2 {
        font-size: 2.5rem;
    }

    #ueber-mich p {
        font-size: 1rem;
        padding: 0 1rem;
    }
}

 


        




        @media (max-width: 480px) {
            .menu-overlay a {
                font-size: 0.75rem;
            }

            .name-overlay {
                font-size: 0.85rem;
                padding: 0.2rem 0.8rem;
                top: 82%;
            }

            #ueber-mich h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <section id="start">
        <!-- Bild mit absoluter Positionierung – füllt immer den Container -->
        <img src="CCEC7E54-6097-4D76-9703-426F9B25DD2A.png" alt="Bioingenieurwesen" />

        <!-- Overlays -->
        <div class="menu-overlay">
            <a href="#ueber-mich">Über mich</a>
        </div>
        <div class="name-overlay">Katarina Opara</div>
    </section>

    <section id="ueber-mich">
        <div class="content">
            <h2>Über mich</h2>
            <p>Hier kommt später Dein Text.</p>
        </div>
    </section>

</body>
</html>
