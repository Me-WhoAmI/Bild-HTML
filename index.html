<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bioingenieurwesen – Startseite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        /* ---------- STARTSEITE ---------- */
        #start {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('CCEC7E54-6097-4D76-9703-426F9B25DD2A.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* ---------- OVERLAY FÜR "ÜBER MICH" ---------- */
        .menu-overlay {
            position: absolute;
            /* Passe hier die Position an: */
            top: 6%;    /* Abstand vom oberen Rand */
            left: 31%;   /* Abstand vom linken Rand */
            transform: translate(-50%, -50%); /* zentriert das Overlay */
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        .menu-overlay a {
            text-decoration: none;
            color: #13323f;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.3rem 0;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s, color 0.2s;
        }

        .menu-overlay a:hover {
            border-bottom-color: #2a7a9c;
            color: #1f6a8a;
        }

        /* ---------- SEITE "ÜBER MICH" ---------- */
        #ueber-mich {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: #f8faff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        #ueber-mich h2 {
            font-size: 3rem;
            font-weight: 300;
            color: #13323f;
            margin-bottom: 1rem;
        }

        #ueber-mich p {
            font-size: 1.2rem;
            color: #4a6a80;
            max-width: 600px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <section id="start">
        <!-- Overlay – positioniere es mit top / left -->
        <div class="menu-overlay">
            <a href="#ueber-mich">Über mich</a>
        </div>
    </section>

    <section id="ueber-mich">
        <h2>Über mich</h2>
        <p>Hier kommt später Ihr Text.</p>
    </section>

</body>
</html>
