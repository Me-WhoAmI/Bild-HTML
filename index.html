<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filigraner Hintergrund – Bioingenieurwesen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #ffffff 0%, #eef6fc 45%, #dce9f2 80%, #c5dae8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* Der reine Vektor-Hintergrund – nimmt die volle Fläche ein */
        .vector-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none; /* damit man später Content darüber klicken kann */
        }

        /* ----- BOKEH (extra weich & blass) ----- */
        .bokeh {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.12;
            pointer-events: none;
        }
        .bokeh:nth-child(1) {
            width: 400px;
            height: 400px;
            background: rgba(160, 200, 225, 0.3);
            top: 0%;
            left: 0%;
        }
        .bokeh:nth-child(2) {
            width: 550px;
            height: 550px;
            background: rgba(200, 230, 245, 0.25);
            bottom: -10%;
            right: -10%;
        }
        .bokeh:nth-child(3) {
            width: 250px;
            height: 250px;
            background: rgba(120, 190, 215, 0.2);
            top: 50%;
            left: 60%;
        }

        /* ----- SVG-LAYER (alle filigranen Zeichnungen) ----- */
        .vector-bg svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Hauchdünne Striche – das ist das Geheimnis von "filigran" */
        .fine-line {
            fill: none;
            stroke: #1a4b5e;
            stroke-width: 0.5;
            opacity: 0.12;
        }
        .fine-dash {
            fill: none;
            stroke: #1a4b5e;
            stroke-width: 0.5;
            stroke-dasharray: 3 5;
            opacity: 0.1;
        }
        .dot-grid {
            fill: #1a4b5e;
            opacity: 0.07;
        }
        .ultra-light {
            stroke: #2a7a9c;
            stroke-width: 0.4;
            opacity: 0.08;
        }
        .plot-line {
            fill: none;
            stroke: #2a7a9c;
            stroke-width: 0.6;
            opacity: 0.13;
        }
        .plot-dot {
            fill: #1f6a8a;
            opacity: 0.15;
        }
        .bioreactor {
            fill: none;
            stroke: #3a6a80;
            stroke-width: 0.6;
            opacity: 0.10;
        }
        .bioreactor-thick {
            fill: none;
            stroke: #3a6a80;
            stroke-width: 0.9;
            opacity: 0.08;
        }
        .dna-strand {
            fill: none;
            stroke: #2a7a9c;
            stroke-width: 0.5;
            opacity: 0.13;
        }
        .dna-rung {
            fill: none;
            stroke: #4a9abb;
            stroke-width: 0.3;
            opacity: 0.08;
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- REINER VEKTOR-HINTERGRUND (ohne Text, ohne Cards)             -->
    <!-- ============================================================ -->
    <div class="vector-bg">

        <!-- Bokeh -->
        <div class="bokeh"></div>
        <div class="bokeh"></div>
        <div class="bokeh"></div>

        <!-- ========== SVG – ALLE FILIGRANEN ELEMENTE ========== -->
        <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">

            <!-- 1. MILLIMETER-PAPIER (feines Raster über die ganze Fläche) -->
            <defs>
                <pattern id="gridFine" width="30" height="30" patternUnits="userSpaceOnUse">
                    <path d="M 30 0 L 0 0 0 30" class="fine-line" />
                </pattern>
                <pattern id="gridMedium" width="120" height="120" patternUnits="userSpaceOnUse">
                    <path d="M 120 0 L 0 0 0 120" class="ultra-light" stroke-width="0.6" />
                </pattern>
            </defs>
            <rect width="1200" height="800" fill="url(#gridFine)" />
            <rect width="1200" height="800" fill="url(#gridMedium)" />

            <!-- 2. DNA-DOPPELHELIX (zentral, hauchdünn) -->
            <g transform="translate(600, 400)">
                <!-- Strang 1 (links) -->
                <path d="M -120 -280 C -60 -160, -180 -80, -120 0 C -60 80, -180 160, -120 280"
                class="dna-strand" stroke-width="0.6" />
                <!-- Strang 2 (rechts) -->
                <path d="M 120 -280 C 60 -160, 180 -80, 120 0 C 60 80, 180 160, 120 280"
                class="dna-strand" stroke-width="0.6" />

                <!-- Querverbindungen (Basenpaare) – extrem fein -->
                <g class="dna-rung">
                    <line x1="-115" y1="-240" x2="115" y2="-240" />
                    <line x1="-105" y1="-200" x2="105" y2="-200" />
                    <line x1="-95" y1="-160" x2="95" y2="-160" />
                    <line x1="-90" y1="-120" x2="90" y2="-120" />
                    <line x1="-95" y1="-80" x2="95" y2="-80" />
                    <line x1="-105" y1="-40" x2="105" y2="-40" />
                    <line x1="-115" y1="0" x2="115" y2="0" />
                    <line x1="-105" y1="40" x2="105" y2="40" />
                    <line x1="-95" y1="80" x2="95" y2="80" />
                    <line x1="-90" y1="120" x2="90" y2="120" />
                    <line x1="-95" y1="160" x2="95" y2="160" />
                    <line x1="-105" y1="200" x2="105" y2="200" />
                    <line x1="-115" y1="240" x2="115" y2="240" />
                </g>

                <!-- Zusätzliche feine Punkte entlang der Stränge -->
                <g class="plot-dot">
                    <circle cx="-118" cy="-260" r="1.5" />
                    <circle cx="-112" cy="-220" r="1.5" />
                    <circle cx="-98" cy="-140" r="1.5" />
                    <circle cx="-92" cy="-60" r="1.5" />
                    <circle cx="-98" cy="20" r="1.5" />
                    <circle cx="-112" cy="100" r="1.5" />
                    <circle cx="-118" cy="180" r="1.5" />
                    <circle cx="-112" cy="260" r="1.5" />
                    <circle cx="118" cy="-260" r="1.5" />
                    <circle cx="112" cy="-220" r="1.5" />
                    <circle cx="98" cy="-140" r="1.5" />
                    <circle cx="92" cy="-60" r="1.5" />
                    <circle cx="98" cy="20" r="1.5" />
                    <circle cx="112" cy="100" r="1.5" />
                    <circle cx="118" cy="180" r="1.5" />
                    <circle cx="112" cy="260" r="1.5" />
                </g>
            </g>

            <!-- 3. BIOREAKTOR / FERMENTER (nur filigrane Umrisse, rechts unten) -->
            <g transform="translate(880, 480)">
                <!-- Hauptzylinder (nur Kontur) -->
                <rect x="0" y="0" width="120" height="160" rx="6" class="bioreactor" />
                <!-- Deckel (Halbkreis oben) -->
                <path d="M 0 0 C 0 -20, 120 -20, 120 0" class="bioreactor" />
                <!-- Sichtfenster (zarter Ring) -->
                <circle cx="60" cy="70" r="30" class="bioreactor-thick" />
                <circle cx="60" cy="70" r="18" class="fine-dash" />
                <!-- Standfüße -->
                <rect x="10" y="160" width="12" height="25" rx="2" class="bioreactor" />
                <rect x="98" y="160" width="12" height="25" rx="2" class="bioreactor" />
                <!-- Rührwerk (Linie durch die Mitte) -->
                <line x1="60" y1="-10" x2="60" y2="30" class="bioreactor-thick" />
                <!-- Rührblätter (nur Striche) -->
                <line x1="35" y1="20" x2="85" y2="20" class="ultra-light" />
                <line x1="40" y1="28" x2="80" y2="28" class="ultra-light" />
                <!-- Rohrleitung (links) -->
                <path d="M -10 50 L -35 50 L -35 110 L -5 110" class="fine-dash" />
                <circle cx="-10" cy="110" r="4" class="plot-dot" />
                <!-- Rohrleitung (rechts) -->
                <path d="M 120 40 L 145 40 L 145 100 L 125 100" class="fine-dash" />
                <circle cx="125" cy="100" r="4" class="plot-dot" />
            </g>

            <!-- 4. TECHNISCHE SKIZZEN & MESSKURVEN (links oben / verteilt) -->
            <g transform="translate(80, 100)">
                <!-- Messkurve (feine Wellenlinie) -->
                <polyline points="0,80 40,60 80,75 120,40 160,65 200,50 240,70 280,45"
                class="plot-line" />
                <!-- Datenpunkte auf der Kurve -->
                <g class="plot-dot">
                    <circle cx="40" cy="60" r="2" />
                    <circle cx="120" cy="40" r="2" />
                    <circle cx="200" cy="50" r="2" />
                    <circle cx="280" cy="45" r="2" />
                </g>
                <!-- Achsen (gestrichelt) -->
                <line x1="0" y1="90" x2="300" y2="90" class="fine-dash" />
                <line x1="0" y1="0" x2="0" y2="90" class="fine-dash" />
                <!-- Kleine Skalenstriche -->
                <g class="fine-line" opacity="0.06">
                    <line x1="40" y1="85" x2="40" y2="95" />
                    <line x1="80" y1="85" x2="80" y2="95" />
                    <line x1="120" y1="85" x2="120" y2="95" />
                    <line x1="160" y1="85" x2="160" y2="95" />
                    <line x1="200" y1="85" x2="200" y2="95" />
                    <line x1="240" y1="85" x2="240" y2="95" />
                    <line x1="280" y1="85" x2="280" y2="95" />
                </g>
            </g>

            <!-- 5. WEITERE DEZENTE INGENIEUR-ELEMENTE (Raster, Kreise, Dreiecke) -->
            <g class="ultra-light" opacity="0.06">
                <!-- Leichtes Dreieck / Prozess-Symbol -->
                <polygon points="150,650 200,580 250,650" />
                <polygon points="950,680 990,620 1030,680" />
                <!-- Winzige Verbindungslinien -->
                <line x1="180" y1="650" x2="180" y2="700" />
                <line x1="990" y1="680" x2="990" y2="730" />
                <!-- Dezente Kreise (wie Fokus-Punkte) -->
                <circle cx="350" cy="650" r="20" />
                <circle cx="350" cy="650" r="10" />
                <circle cx="850" cy="150" r="25" />
                <circle cx="850" cy="150" r="12" />
            </g>

            <!-- 6. GANZ LEICHTE DNA-„SCHATTEN“ (zweite Lage, weiter oben) -->
            <g transform="translate(300, 150)" class="ultra-light" opacity="0.05">
                <path d="M -60 -100 C -30 -50, -90 0, -60 50 C -30 100, -90 150, -60 200"
                stroke-width="0.4" />
                <path d="M 60 -100 C 30 -50, 90 0, 60 50 C 30 100, 90 150, 60 200"
                stroke-width="0.4" />
            </g>

        </svg>
    </div>

    <!-- ============================================================ -->
    <!-- (HIER KANN SPÄTER DEIN CONTENT EINGEFÜGT WERDEN)              -->
    <!-- ============================================================ -->
    <div style="position: relative; z-index: 10; color: #13323f; padding: 2rem; text-align: center; max-width: 600px; background: rgba(255,255,255,0.7); backdrop-filter: blur(4px); border-radius: 2rem; margin: 2rem;">
        <p style="font-size: 1.2rem; font-weight: 300; letter-spacing: 0.5px;">
            ⚙️ Hier kommt später dein Content hin<br />
            <span style="font-size: 0.9rem; opacity: 0.6;">Der Hintergrund bleibt rein filigran &amp; vektorbasiert</span>
        </p>
    </div>

</body>
</html>
