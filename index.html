<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bioingenieurwesen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-image: url('CCEC7E54-6097-4D76-9703-426F9B25DD2A.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* 'fixed' wurde entfernt – das macht auf mobilen Geräten oft Probleme */
        }

        /* Anpassung für Smartphones (kleine Bildschirme) */
        @media (max-width: 600px) {
            body {
                /* Du kannst hier zwischen 'cover' (füllt den Bildschirm, 
                   kann aber oben/unten abschneiden) und 'contain' (zeigt das gesamte Bild, 
                   aber mit Rändern) wählen */
                background-size: cover;
                /* Oder: background-size: contain; */
                background-position: top center; /* fokussiert den oberen Bildbereich */
            }
        }
    </style>
</head>
<body>
    <!-- Absolut leer – das Bild füllt alles -->
</body>
</html>
